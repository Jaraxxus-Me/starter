# Default configuration for RL experiments
defaults:
  - agent: ppo_l_navigate
  - _self_

# Environment configuration
env_id: LNavigate-v0
max_episode_steps: 300

# Evaluation configuration
eval_episodes: 50

# Random seed
seed: 0

# Hydra configuration - disable default output directory
# Our experiment runner manages output directories instead
hydra:
  output_subdir: null
  run:
    dir: .
